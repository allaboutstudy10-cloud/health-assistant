<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create account — Health Assistant</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="navbar">
    <div class="container">
      <a href="index.html" class="brand"><span class="pulse-dot"></span> Health Assistant</a>
      <nav class="nav-links"><a href="login.html">Login</a></nav>
      <div class="nav-cta">
        <button class="icon-btn" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
      </div>
    </div>
  </header>

  <main class="auth-wrapper">
    <div class="auth-card" style="max-width:560px;">
      <h1>Create your account</h1>
      <p class="sub">A few details to set up your personal health profile.</p>

      <div class="form-error" id="formError"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="fullName">Full name</label>
          <input type="text" id="fullName" placeholder="Jane Doe" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 6 characters" minlength="6" required />
          <p class="form-hint">Use at least 6 characters.</p>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age" min="1" max="120" placeholder="28" />
          </div>
          <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender">
              <option value="">Select</option>
              <option value="Female">Female</option>
              <option value="Male">Male</option>
              <option value="Other">Other</option>
              <option value="Prefer not to say">Prefer not to say</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="height">Height (cm)</label>
            <input type="number" id="height" min="50" max="250" step="0.1" placeholder="165" />
          </div>
          <div class="form-group">
            <label for="weight">Weight (kg)</label>
            <input type="number" id="weight" min="2" max="400" step="0.1" placeholder="60" />
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="registerBtn">Create account</button>
      </form>

      <p class="auth-foot">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script>
    const themeBtn = document.getElementById("themeToggle");
    themeBtn.textContent = document.documentElement.getAttribute("data-theme") === "dark" ? "☀️" : "🌙";
    themeBtn.addEventListener("click", () => {
      toggleTheme();
      themeBtn.textContent = document.documentElement.getAttribute("data-theme") === "dark" ? "☀️" : "🌙";
    });

    if (getToken()) window.location.href = "dashboard.html";

    const form = document.getElementById("registerForm");
    const errorBox = document.getElementById("formError");
    const registerBtn = document.getElementById("registerBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";
      registerBtn.disabled = true;
      registerBtn.textContent = "Creating account...";

      try {
        const data = await apiRequest("/auth/register", {
          method: "POST",
          auth: false,
          body: {
            fullName: document.getElementById("fullName").value.trim(),
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value,
            age: document.getElementById("age").value || null,
            gender: document.getElementById("gender").value || null,
            height: document.getElementById("height").value || null,
            weight: document.getElementById("weight").value || null,
          },
        });
        saveSession(data.token, data.user);
        window.location.href = "dashboard.html";
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = "block";
        registerBtn.disabled = false;
        registerBtn.textContent = "Create account";
      }
    });
  </script>
</body>
</html>
