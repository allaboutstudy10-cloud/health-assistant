<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — Health Assistant</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="navbar">
    <div class="container">
      <a href="index.html" class="brand"><span class="pulse-dot"></span> Health Assistant</a>
      <nav class="nav-links"><a href="register.html">Create account</a></nav>
      <div class="nav-cta">
        <button class="icon-btn" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
      </div>
    </div>
  </header>

  <main class="auth-wrapper">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="sub">Log in to see your health dashboard.</p>

      <div class="form-error" id="formError"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Log in</button>
      </form>

      <p class="auth-foot">Don't have an account? <a href="register.html">Sign up</a></p>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script>
    const themeBtn = document.getElementById("themeToggle");
    themeBtn.textContent = document.documentElement.getAttribute("data-theme") === "dark" ? "☀️" : "🌙";
    themeBtn.addEventListener("click", () => {
      toggleTheme();
      themeBtn.textContent = document.documentElement.getAttribute("data-theme") === "dark" ? "☀️" : "🌙";
    });

    // If already logged in, skip straight to the dashboard
    if (getToken()) window.location.href = "dashboard.html";

    const form = document.getElementById("loginForm");
    const errorBox = document.getElementById("formError");
    const loginBtn = document.getElementById("loginBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";
      loginBtn.disabled = true;
      loginBtn.textContent = "Logging in...";

      try {
        const data = await apiRequest("/auth/login", {
          method: "POST",
          auth: false,
          body: {
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value,
          },
        });
        saveSession(data.token, data.user);
        window.location.href = "dashboard.html";
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = "block";
        loginBtn.disabled = false;
        loginBtn.textContent = "Log in";
      }
    });
  </script>
</body>
</html>
