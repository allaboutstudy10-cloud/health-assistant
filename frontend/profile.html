<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profile — Health Assistant</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="mobile-topbar">
    <button class="hamburger" id="openSidebar" aria-label="Open menu">☰</button>
    <a href="dashboard.html" class="brand"><span class="pulse-dot"></span> Health Assistant</a>
    <button class="icon-btn" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
  </div>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <a href="dashboard.html" class="brand"><span class="pulse-dot"></span> Health Assistant</a>
      <nav>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="records.html">🩺 Health Records</a>
        <a href="records.html#history">🗂️ Medical History</a>
        <a href="symptom-checker.html">🔍 Symptom Checker</a>
        <a href="profile.html" class="active">👤 Profile</a>
      </nav>
      <button class="logout-btn" id="logoutBtn">↪ Log out</button>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <div>
          <h1>Your profile</h1>
          <p class="sub">Keep your personal health details up to date.</p>
        </div>
        <button class="icon-btn" id="themeToggleDesktop" aria-label="Toggle dark mode">🌙</button>
      </div>

      <div class="grid-2" style="align-items:flex-start;">
        <div class="card">
          <div style="display:flex; align-items:center; gap:16px; margin-bottom:22px;">
            <div class="profile-avatar" id="avatarInitial">?</div>
            <div>
              <h3 id="profileName">—</h3>
              <p class="card-foot" id="profileEmail">—</p>
            </div>
          </div>

          <div class="form-error" id="formError"></div>
          <div class="form-success" id="formSuccess"></div>

          <form id="profileForm">
            <div class="form-group">
              <label for="fullName">Full name</label>
              <input type="text" id="fullName" required />
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" min="1" max="120" />
              </div>
              <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender">
                  <option value="">Select</option>
                  <option value="Female">Female</option>
                  <option value="Male">Male</option>
                  <option value="Other">Other</option>
                  <option value="Prefer not to say">Prefer not to say</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="height">Height (cm)</label>
                <input type="number" id="height" step="0.1" min="50" max="250" />
              </div>
              <div class="form-group">
                <label for="weight">Weight (kg)</label>
                <input type="number" id="weight" step="0.1" min="2" max="400" />
              </div>
            </div>

            <div class="form-group">
              <label for="newPassword">New password</label>
              <input type="password" id="newPassword" placeholder="Leave blank to keep current password" />
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="saveBtn">Save changes</button>
          </form>
        </div>

        <div>
          <div class="card" style="margin-bottom:18px;">
            <h3 style="margin-bottom:10px;">Account summary</h3>
            <div style="display:flex; flex-direction:column; gap:10px; font-size:0.9rem;">
              <div style="display:flex; justify-content:space-between;"><span style="color:var(--muted);">Member since</span><span id="memberSince">—</span></div>
              <div style="display:flex; justify-content:space-between;"><span style="color:var(--muted);">Current BMI</span><span id="currentBmi">—</span></div>
            </div>
          </div>

          <div class="card">
            <h3 style="margin-bottom:10px;">Reminders</h3>
            <p class="card-foot" style="margin-bottom:14px;">Simple reminders to help you stay consistent.</p>
            <div style="display:flex; flex-direction:column; gap:10px; font-size:0.9rem;">
              <label style="display:flex; align-items:center; gap:10px;">
                <input type="checkbox" id="remBmi" /> Log my BMI weekly
              </label>
              <label style="display:flex; align-items:center; gap:10px;">
                <input type="checkbox" id="remBp" /> Check blood pressure monthly
              </label>
              <label style="display:flex; align-items:center; gap:10px;">
                <input type="checkbox" id="remCheckup" /> Schedule a yearly check-up
              </label>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
